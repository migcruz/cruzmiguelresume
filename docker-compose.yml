services:
  resume-real:
    build: .
    volumes:
      - ./build:/build
    command: ["node", "generate.js", "real"]

  resume-anon:
    build: .
    volumes:
      - ./build:/build
    command: ["node", "generate.js", "anon"]

  tsc-watch:
    build: .
    volumes:
      - ./src:/app/src
    command: ["npx", "tsc", "--watch", "--preserveWatchOutput"]
    profiles: ["dev"]
